<!DOCTYPE html>
<html lang="en">
<head>
  <title>Book Appointment - OrthoCare Hospital</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Extra form styling */
    .form-container {
      width: 400px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
    }

    .form-step {
      margin-bottom: 20px;
    }

    .form-step label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #0077b6;
    }

    .form-step input,
    .form-step select,
    .form-step textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      transition: border 0.3s ease;
    }

    .form-step input:focus,
    .form-step select:focus,
    .form-step textarea:focus {
      border: 1px solid #0077b6;
      outline: none;
    }

    .form-actions {
      text-align: center;
      margin-top: 20px;
    }

    .form-actions button {
      margin: 5px;
      width: 45%;
    }
  </style>
</head>
<body>

<header>
  <h2>OrthoCare Hospital</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="doctors.html">Doctors</a>
    <a href="appointment.html">Appointment</a>
    <a href="contact.html">Contact</a>
  </nav>
  <button id="theme-toggle">Toggle Dark Mode</button>
</header>

<section class="hero">
  <h1>Book Your Appointment</h1>
  <p>Schedule a consultation with our specialists</p>
</section>

<section class="info">
  <div class="form-container">
    <form>
      <div class="form-step">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-step">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="Enter your phone number" required>
      </div>

      <div class="form-step">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="form-step">
        <label for="date">Preferred Date</label>
        <input type="date" id="date" required>
      </div>

      <div class="form-step">
        <label for="doctor">Select Doctor</label>
        <select id="doctor" required>
          <option value="">Choose a doctor</option>
          <option>Dr. Ramesh - Orthopedic Surgeon</option>
          <option>Dr. Priya - Sports Injury Specialist</option>
          <option>Dr. Anil - Joint Replacement Expert</option>
        </select>
      </div>

      <div class="form-step">
        <label for="reason">Reason / Symptoms</label>
        <textarea id="reason" rows="3" placeholder="Describe your symptoms"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit">Submit</button>
        <button type="button" onclick="window.location.href='index.html'">Back</button>
      </div>
    </form>
  </div>
</section>

<footer>
  <p>© 2026 OrthoCare Hospital | All Rights Reserved</p>
</footer>

<script src="theme.js"></script>
</body>
</html>
